name: Update streak stats

on:
  schedule:
    - cron: "0 3 * * *"

  push:
    paths:
      - ".github/workflows/streak-stats.yml"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=o0-James-0o&theme=tokyonight&background=1A1B27&border=7C3AED&border_radius=12&stroke=3B4261&ring=7C3AED&fire=A78BFA&currStreakNum=A78BFA&sideNums=70A5FD&currStreakLabel=A78BFA&sideLabels=70A5FD&dates=38BDAE&card_width=495&card_height=195&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg
          git commit -m "Update streak stats" || exit 0
          git push
